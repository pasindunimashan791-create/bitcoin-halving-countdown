<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Halving Countdown</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#0b0f1a,#000);
color:white;
text-align:center;
}

h1{
color:#f7931a;
margin-top:40px;
text-shadow:0 0 10px #f7931a;
}

.card{
margin-top:25px;
font-size:20px;
color:#aaa;
}

.timer{
font-size:45px;
color:#00ffcc;
margin-top:20px;
text-shadow:0 0 15px #00ffcc;
}

.price{
margin-top:20px;
font-size:22px;
color:#fff;
}

.footer{
margin-top:60px;
font-size:12px;
color:#555;
}
</style>
</head>

<body>

<h1>₿ Bitcoin Halving Countdown</h1>

<div class="card">Next Halving In</div>
<div class="timer" id="countdown">Loading...</div>

<div class="price">
💰 Bitcoin Price: $<span id="btcPrice">Loading...</span>
</div>

<div class="footer">Live crypto tracker</div>

<script>
// COUNTDOWN
const target = new Date("2028-04-10T00:00:00").getTime();

setInterval(()=>{
let now = new Date().getTime();
let diff = target - now;

let d = Math.floor(diff/(1000*60*60*24));
let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
let m = Math.floor((diff%(1000*60*60))/(1000*60));
let s = Math.floor((diff%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
d+"d "+h+"h "+m+"m "+s+"s";
},1000);

// BITCOIN PRICE
async function price(){
try{
let res = await fetch("https://api.coindesk.com/v1/bpi/currentprice/USD.json");
let data = await res.json();
document.getElementById("btcPrice").innerText =
data.bpi.USD.rate;
}catch(e){
document.getElementById("btcPrice").innerText="Error";
}
}

price();
setInterval(price,60000);
</script>

</body>
</html>
