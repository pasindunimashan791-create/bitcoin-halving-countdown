<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bitcoin Halving Countdown 2028 | Live BTC Tracker</title>

<meta name="description" content="Live Bitcoin Halving Countdown with BTC price, block height, and crypto tracker dashboard.">
<meta name="keywords" content="bitcoin halving, btc countdown, bitcoin price, crypto tracker">
<meta name="robots" content="index, follow">

<style>

body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top, #0f172a, #000);
color:white;
text-align:center;
}

.glow{
position:absolute;
width:280px;
height:280px;
background:#00ffcc;
filter:blur(140px);
opacity:0.15;
top:10%;
left:50%;
transform:translateX(-50%);
z-index:-1;
}

h1{
color:#f7931a;
margin-top:25px;
font-size:32px;
text-shadow:0 0 10px #f7931a, 0 0 20px #ff9900;
}

.card{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(12px);
margin:18px auto;
padding:18px;
width:85%;
border-radius:15px;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 20px rgba(0,255,204,0.08);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 0 25px rgba(0,255,204,0.25);
}

.timer{
font-size:42px;
color:#00ffcc;
text-shadow:0 0 10px #00ffcc, 0 0 20px #00ffee;
}

.price{
font-size:20px;
margin-top:10px;
color:#fff;
}

.small{
font-size:14px;
color:#aaa;
}

.progress{
width:85%;
height:12px;
background:#222;
margin:10px auto;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
width:40%;
background:linear-gradient(90deg,#f7931a,#00ffcc);
}

.footer{
font-size:12px;
color:#777;
margin-top:25px;
padding-bottom:10px;
}

.links a{
color:#f7931a;
margin:0 10px;
text-decoration:none;
}

.links a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="glow"></div>

<h1>₿ Bitcoin Halving Countdown</h1>

<div class="card">
<div class="small">Next Halving In</div>
<div class="timer" id="countdown">Loading...</div>
</div>

<div class="card">
💰 Bitcoin Price: $<span id="btcPrice">Loading...</span>
</div>

<div class="card">
⛏️ Block Height: <span id="blockHeight">Loading...</span>
</div>

<div class="card">
📊 Halving Progress
<div class="progress">
<div class="bar" id="bar"></div>
</div>
</div>

<div class="card links">
<a href="privacy.html">Privacy Policy</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>

<div class="footer">
Live Crypto Dashboard
</div>

<script>

// COUNTDOWN
const target = new Date("2028-04-10T00:00:00").getTime();

setInterval(()=>{
let now = new Date().getTime();
let diff = target - now;

let d = Math.floor(diff/(1000*60*60*24));
let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
let m = Math.floor((diff%(1000*60*60))/(1000*60));
let s = Math.floor((diff%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
d+"d "+h+"h "+m+"m "+s+"s";
},1000);

// PRICE
async function getPrice(){
try{
const res = await fetch("https://api.coinbase.com/v2/prices/BTC-USD/spot");
const data = await res.json();
document.getElementById("btcPrice").innerText =
parseFloat(data.data.amount).toLocaleString();
}catch(e){
document.getElementById("btcPrice").innerText="Error";
}
}

getPrice();
setInterval(getPrice,60000);

// BLOCK HEIGHT
async function getBlock(){
try{
const res = await fetch("https://blockchain.info/q/getblockcount");
const data = await res.text();
document.getElementById("blockHeight").innerText = data;

let current = parseInt(data);
let start = 840000;
let next = 1050000;

let progress = ((current - start)/(next - start))*100;
if(progress>100)progress=100;
if(progress<0)progress=0;

document.getElementById("bar").style.width = progress+"%";

}catch(e){
document.getElementById("blockHeight").innerText="Error";
}
}

getBlock();
setInterval(getBlock,30000);

</script>

</body>
</html>
