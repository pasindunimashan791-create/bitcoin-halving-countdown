<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Halving Countdown</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#0b0f1a,#000);
color:white;
text-align:center;
}

h1{
color:#f7931a;
margin-top:30px;
text-shadow:0 0 10px #f7931a;
}

.card{
background:#111;
margin:20px auto;
padding:15px;
width:85%;
border-radius:12px;
box-shadow:0 0 10px #000;
}

.timer{
font-size:40px;
color:#00ffcc;
text-shadow:0 0 10px #00ffcc;
}

.price{
font-size:20px;
margin-top:10px;
}

.footer{
font-size:12px;
color:#555;
margin-top:30px;
}
</style>
</head>

<body>

<h1>₿ Bitcoin Halving Countdown</h1>

<div class="card">
<div>Next Halving In</div>
<div class="timer" id="countdown">Loading...</div>
</div>

<div class="card">
💰 Bitcoin Price: $<span id="btcPrice">Loading...</span>
</div>

<div class="footer">
Live Bitcoin tracker website
</div>

<script>

// ⏳ COUNTDOWN
const target = new Date("2028-04-10T00:00:00").getTime();

setInterval(()=>{
let now = new Date().getTime();
let diff = target - now;

let d = Math.floor(diff/(1000*60*60*24));
let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
let m = Math.floor((diff%(1000*60*60))/(1000*60));
let s = Math.floor((diff%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
d+"d "+h+"h "+m+"m "+s+"s";
},1000);

// 💰 LIVE BITCOIN PRICE (FIXED)
async function getPrice(){
try{
const res = await fetch("https://api.coinbase.com/v2/prices/BTC-USD/spot");
const data = await res.json();

document.getElementById("btcPrice").innerText =
parseFloat(data.data.amount).toLocaleString();

}catch(e){
document.getElementById("btcPrice").innerText="Error loading price";
}
}

getPrice();
setInterval(getPrice,60000);

</script>

</body>
</html>
