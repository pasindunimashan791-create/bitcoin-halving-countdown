<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bitcoin Halving Countdown 2028 | Live BTC Tracker</title>

<meta name="description" content="Live Bitcoin Halving Countdown with BTC price, block height, and crypto affiliate tools.">
<meta name="keywords" content="bitcoin halving, btc countdown, bitcoin price, crypto tracker">
<meta name="robots" content="index, follow">

<style>

body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top, #0f172a, #000);
color:white;
text-align:center;
overflow-x:hidden;
}

.glow{
position:absolute;
width:280px;
height:280px;
background:#00ffcc;
filter:blur(140px);
opacity:0.15;
top:10%;
left:50%;
transform:translateX(-50%);
z-index:-1;
}

h1{
color:#f7931a;
margin-top:25px;
font-size:32px;
text-shadow:0 0 10px #f7931a, 0 0 20px #ff9900;
}

.card{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(12px);
margin:18px auto;
padding:18px;
width:85%;
border-radius:15px;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 20px rgba(0,255,204,0.08);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 0 25px rgba(0,255,204,0.25);
}

.timer{
font-size:42px;
color:#00ffcc;
text-shadow:0 0 10px #00ffcc, 0 0 20px #00ffee;
}

.price{
font-size:20px;
margin-top:10px;
color:#fff;
}

.small{
font-size:13px;
color:#aaa;
}

.button{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin:5px;
}

.binance{background:#f7931a;color:#000;}
.bybit{background:#00ffcc;color:#000;}

.footer{
font-size:12px;
color:#777;
margin-top:25px;
padding-bottom:20px;
}

a{text-decoration:none;}

</style>

</head>

<body>

<div class="glow"></div>

<h1>₿ Bitcoin Halving Countdown</h1>

<div class="card">
<div class="small">Next Halving In</div>
<div class="timer" id="countdown">Loading...</div>
</div>

<div class="card">
💰 Bitcoin Price: $<span id="btcPrice">Loading...</span>
</div>

<!-- AFFILIATE SECTION -->
<div class="card">
<h3>💰 Start Crypto Trading</h3>
<p>Join trusted exchanges and start your crypto journey.</p>

<a href="https://www.binance.com/referral/earn-together/refer2earn-usdc/claim?hl=en&ref=GRO_28502_1IDLP&utm_source=referral_entrance" target="_blank">
<button class="button binance">Start on Binance</button>
</a>

<a href="https://www.bybit.com/invite?ref=1BDP9Z&medium=referral&utm_campaign=evergreen" target="_blank">
<button class="button bybit">Start on Bybit</button>
</a>

</div>

<div class="footer">
Live Bitcoin Dashboard • Affiliate links included
</div>

<script>

// COUNTDOWN
const target = new Date("2028-04-10T00:00:00").getTime();

setInterval(()=>{
let now = new Date().getTime();
let diff = target - now;

let d = Math.floor(diff/(1000*60*60*24));
let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
let m = Math.floor((diff%(1000*60*60))/(1000*60));
let s = Math.floor((diff%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
d+"d "+h+"h "+m+"m "+s+"s";
},1000);

// PRICE
async function getPrice(){
try{
const res = await fetch("https://api.coinbase.com/v2/prices/BTC-USD/spot");
const data = await res.json();
document.getElementById("btcPrice").innerText =
parseFloat(data.data.amount).toLocaleString();
}catch(e){
document.getElementById("btcPrice").innerText="Error";
}
}

getPrice();
setInterval(getPrice,60000);

</script>

</body>
</html>
