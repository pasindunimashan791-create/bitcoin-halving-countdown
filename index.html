<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitcoin Halving Countdown</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle, #0b0f1a, #000);
      color: #fff;
      text-align: center;
    }

    h1 {
      color: #f7931a;
      margin-top: 40px;
      font-size: 32px;
      text-shadow: 0 0 10px #f7931a;
    }

    .container {
      margin-top: 50px;
    }

    .timer {
      font-size: 50px;
      color: #00ffcc;
      text-shadow: 0 0 15px #00ffcc;
      margin-top: 20px;
    }

    .box {
      margin-top: 20px;
      font-size: 18px;
      color: #aaa;
    }

    .footer {
      margin-top: 60px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>

<body>

<h1>₿ Bitcoin Halving Countdown</h1>

<div class="container">
  <div class="box">Next Bitcoin Halving In:</div>
  <div class="timer" id="countdown">Loading...</div>
</div>

<div class="footer">
  Live crypto countdown website
</div>

<script>
  const targetDate = new Date("2028-04-10T00:00:00").getTime();

  setInterval(function () {
    const now = new Date().getTime();
    const distance = targetDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / 1000 / 60 / 60);
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / 1000 / 60);
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
      days + "d " + hours + "h " + minutes + "m " + seconds + "s";

  }, 1000);
</script>

</body>
</html>
